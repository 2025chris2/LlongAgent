spring:
  application:
    name: llongaiagent
  ai:
    dashscope:
      api-key: sk-bbf7bd07faa44cdc9b5babcb2dbe8ee0
      chat:
        options:
          model: qwen3-max
  # springdoc-openapi 接口文档项目配置
springdoc:
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  api-docs:
    path: /v3/api-docs
  group-configs:
    - group: 'default'
      paths-to-match: '/**'
      # 修改一下路径，把controller的包的路径写在下面
      packages-to-scan: com/tzl/llongaiagent/controller
  # knife4j的增强配置，不需要增强可以不配
knife4j:
  enable: true
  setting:
    language: zh_cn
server:
  port: 8080
  servlet:
    context-path: /api