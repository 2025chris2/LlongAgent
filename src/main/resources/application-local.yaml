spring:
  application:
    name: llongaiagent
#  datasource:
#    url: jdbc:postgresql://tzl-ai-rag-pg.pg.polardb.rds.aliyuncs.com:5432/tzl
#    username: my_root
#    password: 2534838591@asd
  ai:
    dashscope:
      api-key: sk-bbf7bd07faa44cdc9b5babcb2dbe8ee0
      chat:
        options:
          model: qwen3-max
    vectorstore:
      pgvector:
      index-type: HNSW #索引类型
      distance-type: COSINE_DISTANCE
      dimensions: 1024 # 向量字段的维度
      max-document-batch-size: 10000 # Optional: Maximum number of documents per batch

  # springdoc-openapi 接口文档项目配置
springdoc:
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  api-docs:
    path: /v3/api-docs
  group-configs:
    - group: 'default'
      paths-to-match: '/**'
      # 修改一下路径，把controller的包的路径写在下面
      packages-to-scan: com/tzl/llongaiagent/controller
  # knife4j的增强配置，不需要增强可以不配
knife4j:
  enable: true
  setting:
    language: zh_cn
server:
  port: 8080
  servlet:
    context-path: /api
searchAPi:
  apiKey: i2Grugyg9RpYS6SeRDipcwtW

